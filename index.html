<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Reels Tracker — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A; --surface: #111111; --surface-2: #1F1F1F;
    --white: #FFFFFF; --soft-white: #F4F4F5; --muted: #A1A1AA;
    --sky: #A5E8FF; --sky-dim: rgba(165, 232, 255, 0.15);
    --orange: #FB923C; --orange-glow: rgba(251, 146, 60, 0.55);
    --green: #4ADE80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--black); color: var(--white); font-family: 'Tajawal','Inter',sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .num { font-family: 'Inter',sans-serif; font-feature-settings: "tnum"; }
  .app { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-dot { width: 10px; height: 10px; background: var(--sky); border-radius: 50%; box-shadow: 0 0 16px var(--sky); }
  .brand-name { font-weight: 900; font-size: 18px; }
  .clock { font-family: 'Inter',sans-serif; color: var(--muted); font-size: 14px; font-variant-numeric: tabular-nums; }
  .clock .live { color: var(--sky); margin-inline-start: 8px; }
  .sync-ring { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--sky); margin-inline-end: 6px; box-shadow: 0 0 0 0 rgba(165,232,255,0.7); animation: sync-ping 2.4s ease-out infinite; }
  @keyframes sync-ping { 0% { box-shadow: 0 0 0 0 rgba(165,232,255,0.55); } 70% { box-shadow: 0 0 0 10px rgba(165,232,255,0); } 100% { box-shadow: 0 0 0 0 rgba(165,232,255,0); } }

  .headline { position: relative; padding: 28px 40px; margin-bottom: 20px; background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; display: flex; align-items: center; gap: 32px; overflow: hidden; }
  .headline::after { content: ""; position: absolute; inset-inline-end: -10%; top: -60%; width: 50%; height: 220%; background: radial-gradient(ellipse, rgba(251,146,60,0.14), transparent 65%); pointer-events: none; }
  .headline-text { flex: 1; position: relative; z-index: 1; }
  .headline-eyebrow { display: inline-block; color: var(--orange); font-family: 'Inter',sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.22em; margin-bottom: 8px; }
  .headline-title { font-size: 20px; font-weight: 700; color: var(--muted); line-height: 1.35; }
  .headline-title .crazy { font-family: 'Inter',sans-serif; font-size: 64px; font-weight: 900; color: var(--orange); line-height: 1; margin-inline-end: 6px; text-shadow: 0 0 28px var(--orange-glow); font-variant-numeric: tabular-nums; vertical-align: -8px; }
  .headline-title b { color: var(--white); font-weight: 900; }
  .headline-mini { display: flex; gap: 18px; margin-top: 16px; }
  .headline-mini-item { min-width: 100px; }
  .headline-mini-label { font-family: 'Inter',sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 0.12em; font-weight: 700; margin-bottom: 6px; }
  .headline-mini-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
  .headline-mini-fill { height: 100%; background: var(--sky); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .headline-mini-num { font-family: 'Inter',sans-serif; font-size: 13px; color: var(--soft-white); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .headline-mini-num .total { color: var(--muted); }

  .hero { background: linear-gradient(180deg, rgba(165,232,255,0.04), transparent); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 36px 40px; margin-bottom: 28px; position: relative; overflow: hidden; }
  .hero-label { display: inline-block; color: var(--sky); font-family: 'Inter',sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; margin-bottom: 12px; }
  .hero-title { font-size: 38px; font-weight: 900; color: var(--white); line-height: 1.2; margin-bottom: 24px; }
  .hero-progress-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .hero-current { font-family: 'Inter',sans-serif; font-size: 56px; font-weight: 900; color: var(--white); line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-target { font-family: 'Inter',sans-serif; font-size: 22px; color: var(--muted); font-weight: 500; }
  .hero-target b { color: var(--soft-white); font-weight: 700; }
  .hero-meta { margin-inline-start: auto; text-align: end; font-family: 'Inter',sans-serif; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .hero-meta .days { color: var(--sky); font-weight: 700; font-size: 18px; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; position: relative; }
  .progress-fill { height: 100%; background: var(--sky); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 12px rgba(165,232,255,0.5); }
  .milestone { position: absolute; top: -3px; height: 14px; width: 2px; background: var(--orange); box-shadow: 0 0 8px var(--orange-glow); }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 28px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .hero-title { font-size: 28px; } .hero-current { font-size: 42px; } }
  .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 28px; position: relative; overflow: hidden; transition: border-color 0.3s, transform 0.3s; }
  .card.pulse { animation: card-pulse 1s ease-out; }
  @keyframes card-pulse {
    0% { box-shadow: 0 0 0 0 rgba(165,232,255,0.6), inset 0 0 0 1px rgba(165,232,255,0.4); transform: scale(1); }
    50% { transform: scale(1.015); }
    100% { box-shadow: 0 0 0 20px rgba(165,232,255,0), inset 0 0 0 1px rgba(165,232,255,0); transform: scale(1); }
  }
  .card.goal-hit { border-color: rgba(251,146,60,0.55); }
  .card.goal-hit::before { content: ""; position: absolute; top: 0; inset-inline-end: 0; width: 80px; height: 80px; background: radial-gradient(circle at top right, rgba(251,146,60,0.22), transparent 70%); pointer-events: none; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .card-platform { display: flex; align-items: center; gap: 12px; }
  .card-icon { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; background: var(--surface-2); }
  .card-icon svg { width: 18px; height: 18px; color: var(--soft-white); }
  .card-name { font-size: 17px; font-weight: 700; color: var(--soft-white); }
  .card-badge { font-family: 'Inter',sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; padding: 4px 10px; border-radius: 99px; background: var(--sky-dim); color: var(--sky); transition: background 0.3s, color 0.3s; }
  .card-badge.auto { background: rgba(74,222,128,0.14); color: var(--green); }
  .card-badge.warn { background: rgba(251,146,60,0.16); color: var(--orange); }
  .card-badge.muted { background: rgba(255,255,255,0.05); color: var(--muted); }
  .card-today-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .card-today { font-family: 'Inter',sans-serif; font-size: 76px; font-weight: 900; color: var(--white); line-height: 1; font-variant-numeric: tabular-nums; transition: color 0.3s; }
  .card-today.bumping { animation: bump 0.6s cubic-bezier(0.25,1.4,0.5,1); }
  @keyframes bump { 0% { transform: scale(1); color: var(--white); } 40% { transform: scale(1.18); color: var(--sky); } 100% { transform: scale(1); color: var(--white); } }
  .card-of { font-family: 'Inter',sans-serif; font-size: 22px; color: var(--muted); font-weight: 500; }
  .card-of b { color: var(--soft-white); font-weight: 700; }
  .card-remaining { font-size: 14px; color: var(--sky); margin-bottom: 10px; font-weight: 500; }
  .card-remaining.done { color: var(--orange); text-shadow: 0 0 12px var(--orange-glow); }
  .card-week-row { display: flex; align-items: center; justify-content: space-between; font-family: 'Inter',sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.04em; }
  .card-week-row .card-week-label { font-family: 'Tajawal',sans-serif; font-size: 13px; color: var(--soft-white); font-weight: 500; letter-spacing: 0; }
  .card-week-row .card-week-num b { color: var(--white); font-weight: 700; font-size: 14px; }
  .card-week-bar { flex: 1 1 auto; height: 4px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; margin: 0 10px; }
  .card-week-fill { height: 100%; background: var(--sky); border-radius: 99px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1); }
  .ctrl-row { display: flex; gap: 7px; margin-top: 14px; margin-bottom: 4px; }
  .ctrl-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; cursor: pointer; border: 1.5px solid; background: transparent; transition: background .15s, transform .1s; -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1; }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn.plus { background: rgba(165,232,255,0.08); border-color: rgba(165,232,255,0.28); color: var(--sky); }
  .ctrl-btn.plus:hover { background: rgba(165,232,255,0.16); border-color: var(--sky); }
  .ctrl-btn.minus { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.22); color: #F87171; }
  .ctrl-btn.minus:hover { background: rgba(248,113,113,0.14); }
  .card.pulse { animation: pulse-card 0.7s ease-out; }
  @keyframes pulse-card { 0% { box-shadow: 0 0 0 0 rgba(165,232,255,0.5); } 100% { box-shadow: 0 0 0 14px rgba(165,232,255,0); } }

  /* Sound toggle icon button */
  .icon-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--muted); width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: grid; place-items: center; transition: all 0.2s; font-size: 16px; padding: 0; }
  .icon-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
  .icon-btn.muted { opacity: 0.5; }

  /* Toast for +1 feedback */
  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #181818; border: 1px solid rgba(255,255,255,0.08); color: var(--sky); font-family: 'Inter', sans-serif; font-size: 12px; padding: 8px 18px; border-radius: 22px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; letter-spacing: 0.04em; }
  .toast.show { opacity: 1; }

  /* ── Mobile ────────────────────────────────────────── */
  @media (max-width: 600px) {
    .app { padding: 18px 14px 60px; }
    header { margin-bottom: 18px; }
    .brand-name { font-size: 15px; }
    .clock { font-size: 11px; }
    .hero { padding: 22px 20px; border-radius: 18px; }
    .hero-label { font-size: 10px; }
    .hero-title { font-size: 22px !important; margin-bottom: 16px; }
    .hero-current { font-size: 38px !important; }
    .hero-target { font-size: 16px; }
    .hero-meta { margin-inline-start: 0; text-align: start; font-size: 12px; width: 100%; margin-top: 8px; }
    .headline { padding: 20px 18px; border-radius: 18px; }
    .headline-title { font-size: 16px; }
    .headline-title .crazy { font-size: 44px; vertical-align: -4px; }
    .headline-mini { gap: 8px; }
    .headline-mini-item { min-width: 76px; }
    .card { padding: 20px 18px; border-radius: 18px; }
    .card-today { font-size: 60px; }
    .card-of { font-size: 18px; }
    .card-name { font-size: 16px; }
    .card-icon { width: 32px; height: 32px; }
    .ctrl-btn { padding: 12px 0; font-size: 24px; }
    .footer { padding: 18px 18px; border-radius: 14px; gap: 14px; }
    .footer-value { font-size: 20px; }
    .footer-label { font-size: 9px; }
  }
  @media (max-width: 380px) {
    .hero-title { font-size: 19px !important; }
    .headline-title .crazy { font-size: 36px; }
    .card-today { font-size: 52px; }
  }
  .card-progress-label { display: flex; justify-content: space-between; font-family: 'Inter',sans-serif; font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.06em; }
  .card-progress-label b { color: var(--soft-white); font-weight: 700; }

  .footer { display: flex; justify-content: space-between; align-items: center; padding: 24px 28px; background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; flex-wrap: wrap; gap: 16px; }
  .footer-stat { display: flex; flex-direction: column; gap: 4px; }
  .footer-label { font-family: 'Inter',sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 0.14em; font-weight: 700; }
  .footer-value { font-family: 'Inter',sans-serif; font-size: 24px; font-weight: 900; color: var(--soft-white); }
  .footer-value .accent { color: var(--sky); }
  .footer-value .fire { display: inline-block; filter: drop-shadow(0 0 8px var(--orange-glow)); }
  .updated { font-family: 'Inter',sans-serif; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">Reels Tracker</div>
    </div>
    <div class="clock"><span id="date"></span><span class="live"><span class="sync-ring"></span><span id="liveText">LIVE</span></span></div>
  </header>

  <section class="headline">
    <div class="headline-text">
      <div class="headline-eyebrow">THE ONLY NUMBER THAT MATTERS · 4 MONTHS</div>
      <div class="headline-title">
        ننزّل <span class="crazy num">3000</span> ريل short-form على <b>TikTok · Instagram · YouTube Shorts</b>
      </div>
      <div class="headline-mini" id="headlineMini"></div>
    </div>
  </section>

  <section class="hero">
    <div class="hero-label">NORTH STAR · 4 MONTHS</div>
    <h1 class="hero-title">الطريق إلى <span class="num">2000</span> عضو في Skool</h1>
    <div class="hero-progress-row">
      <span class="hero-current num" id="heroCurrent">0</span>
      <span class="hero-target num">من <b>2000</b> عضو</span>
      <div class="hero-meta">
        <div><span class="days num" id="daysRemaining">122</span> يوم متبقي</div>
        <div>معدل اليوم: <span class="num" id="paceNum">0</span>/يوم</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="heroFill" style="width: 0%"></div>
      <div class="milestone" style="inset-inline-start: 25%"></div>
      <div class="milestone" style="inset-inline-start: 50%"></div>
      <div class="milestone" style="inset-inline-start: 75%"></div>
    </div>
  </section>

  <section class="grid" id="grid"></section>

  <div class="footer">
    <div class="footer-stat">
      <div class="footer-label">TODAY · مرفوع</div>
      <div class="footer-value"><span class="num accent" id="todayTotal">0</span> / <span class="num" id="todayGoal">24</span></div>
    </div>
    <div class="footer-stat">
      <div class="footer-label">WEEK · هذا الأسبوع</div>
      <div class="footer-value"><span class="num" id="weekTotal">—</span></div>
    </div>
    <div class="footer-stat">
      <div class="footer-label">آخر منشور</div>
      <div class="footer-value" id="lastPost" style="font-size:14px; color:var(--muted); font-family:'Tajawal';">—</div>
    </div>
    <div class="footer-stat">
      <div class="footer-label">UPDATED</div>
      <div class="updated" id="updated">—</div>
    </div>
    <button id="muteBtn" class="icon-btn" type="button" aria-label="toggle sound" title="صوت">🔊</button>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────
const SHEET_ID = '1HoMqTmBTEvw3XCq-Fy2CnxY2SOLauOCpJllLewfnMXw';
// docs export?format=csv preserves all cell values raw. gviz/tq?out=csv was
// inferring column B's type as "number" because of the 2000/3000 cells in the
// meta section, then silently DROPPING the string values (current_day,
// current_iso_week, last_post_at) on read — so the client-side stale-day
// detection had no current_day to compare against and the lastPost timeAgo
// label was permanently empty. gid is the counts sheet's numeric id.
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=361543292`;
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwkArekZ_HQP-ewcLbnnNxXPBOFBJBZiC0m3VSbtLWfSo8i6ysMYdh8TMAAvCndGyBa/exec';
const WEBHOOK_SECRET = 'reels-2026-E4ox3kqmoK2JAg';
// ── Pending-deltas FIFO per platform ─────────────────────
// Each click pushes an entry. Each pull pops entries from the FRONT as the
// server confirms them in order. This is the ONLY correct way to handle
// mixed +1/-1 bursts: a summary offset breaks when the server confirms one
// direction before the other (e.g. user does +8 then -5 — Apps Script
// processes the +8 first, the pull sees serverDelta=+6 mid-burst, and a
// summary offset would mistakenly drain +1s that haven't been confirmed yet).
const pendingDeltas = { tiktok: [], instagram: [], youtube_shorts: [], youtube_long: [] };
function pendingSum(p) { return (pendingDeltas[p] || []).reduce((s, e) => s + e.delta, 0); }
// Back-compat surface — render() still reads offsets[p] for display math.
const offsets = new Proxy({}, {
  get(_, p) { return pendingSum(p); },
  set(_, p, v) { /* writes go through bumpPlatform / pull */ return true; },
});
// Per-platform last-confirmed server today_count, for the FIFO pop logic.
const serverLastSeenToday = {};
// Per-platform `at` of the most-recent JSONP response we acted on (i.e. the
// click submission time of the highest-`at` write whose response has come back).
// Older out-of-order responses are ignored so lastSeenData never rolls backward.
const lastResponseAt = {};
// Per-platform wall-clock timestamp of the last JSONP response — used by the
// pull loop to detect "my CSV fetch is older than the latest JSONP, so my
// data is stale for this platform; skip overwriting."
const lastJsonpAt = {};
let lastSeenMeta = {};

// ── Sound (WebAudio) + mute persistence ────────────────
let muted = (localStorage.getItem('reels.muted') === '1');
let audioCtx = null;
function playChime(kind = 'plus') {
  if (muted) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const pairs = kind === 'plus' ? [[880, 0], [1320, 0.06]]
                : kind === 'goal' ? [[523, 0], [659, 0.08], [784, 0.16]]
                : [[440, 0]]; // minus
    pairs.forEach(([freq, delay]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t + delay);
      g.gain.exponentialRampToValueAtTime(kind === 'minus' ? 0.08 : 0.13, t + delay + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + delay + (kind === 'goal' ? 0.28 : 0.2));
      o.start(t + delay); o.stop(t + delay + 0.3);
    });
  } catch (e) { /* silent */ }
}
function applyMuteUI() {
  const btn = document.getElementById('muteBtn');
  if (!btn) return;
  btn.textContent = muted ? '🔇' : '🔊';
  btn.classList.toggle('muted', muted);
}

function showToast(msg) {
  let t = document.getElementById('reelsToast');
  if (!t) {
    t = document.createElement('div'); t.id = 'reelsToast'; t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function bumpPlatform(platformId, delta) {
  const data = lastSeenData[platformId] || {};
  const cur = (parseFloat(data.today_count) || 0) + pendingSum(platformId);
  if (delta < 0 && cur + delta < 0) return;
  pendingDeltas[platformId].push({ delta, at: Date.now() });
  // Optimistic re-render: cards + headline minis + footer (all in one render call)
  render({ platforms: lastSeenData, meta: lastSeenMeta });
  // Animate the bumped card
  const card = document.querySelector(`.card[data-platform="${platformId}"]`);
  if (card) {
    card.classList.add('pulse'); setTimeout(()=>card.classList.remove('pulse'), 700);
    const todayEl = card.querySelector('[data-today]');
    if (todayEl && delta > 0) {
      todayEl.classList.remove('bumping'); void todayEl.offsetWidth; todayEl.classList.add('bumping');
    }
  }
  playChime(delta > 0 ? 'plus' : 'minus');
  showToast(delta > 0 ? '✓ +1 تم' : '✓ −1 تم');
  // JSONP write. Apps Script returns `callback(json)` which the browser
  // executes — no CORS preflight, no opaque redirect, no parallel-request
  // race (which is what broke POST + no-cors under Playwright). The callback
  // gets the authoritative {ok, today_count, ...} for THIS exact click, so
  // we drain the matching queue entry deterministically.
  // The pull at +1500ms is a safety net for the case where the JSONP callback
  // itself never fires (network drop) — pull's FIFO drain catches it.
  sendWebhookJSONP(platformId, delta, pendingDeltas[platformId][pendingDeltas[platformId].length - 1]);
  schedulePull(1500);
}

function sendWebhookJSONP(platformId, delta, entry) {
  const cb = '__reels_cb_' + Math.random().toString(36).slice(2, 10);
  const s = document.createElement('script');
  let settled = false;
  const finish = () => {
    if (settled) return; settled = true;
    delete window[cb];
    if (s.parentNode) s.parentNode.removeChild(s);
  };
  window[cb] = (res) => {
    finish();
    const q = pendingDeltas[platformId];
    const myAt = entry ? entry.at : 0;
    if (res && res.ok) {
      // Pop EVERY entry submitted at-or-before this one. Apps Script's
      // LockService processes webhook calls in arrival order, so any earlier
      // click must have already landed by the time this response comes back.
      // Without this, an out-of-order JSONP response would only remove its
      // exact entry, leaving earlier ones in the queue and double-counting.
      pendingDeltas[platformId] = q.filter(e => e.at > myAt);
      // Snap lastSeenData ONLY if this response is the most-recent click
      // we've heard back about. Older responses would roll the server snap
      // backwards and produce a visible flicker.
      if ((lastResponseAt[platformId] || 0) <= myAt) {
        lastResponseAt[platformId] = myAt;
        lastJsonpAt[platformId] = Date.now();
        lastSeenData[platformId] = Object.assign({}, lastSeenData[platformId], {
          today_count: res.today_count, total_count: res.total_count, week_count: res.week_count,
        });
        serverLastSeenToday[platformId] = res.today_count;
      }
      render({ platforms: lastSeenData, meta: lastSeenMeta });
    } else {
      const idx = entry ? q.indexOf(entry) : -1;
      if (idx !== -1) q.splice(idx, 1);
      const why = (res && res.error) || 'unknown';
      showToast(why === 'would_go_negative' ? '✗ ما نقدر ننقص أكثر' : '✗ ما انحفظت — جرّب مرة ثانية');
      render({ platforms: lastSeenData, meta: lastSeenMeta });
    }
  };
  s.onerror = () => {
    finish();
    const q = pendingDeltas[platformId];
    const idx = entry ? q.indexOf(entry) : -1;
    if (idx !== -1) q.splice(idx, 1);
    showToast('✗ ما وصل — تحقّق من الإنترنت');
    render({ platforms: lastSeenData, meta: lastSeenMeta });
  };
  s.src = WEBHOOK_URL + '?' + new URLSearchParams({
    platform: platformId, delta: String(delta),
    secret: WEBHOOK_SECRET, source: 'public-dashboard',
    callback: cb,
  }).toString();
  document.head.appendChild(s);
  // Hard timeout so a stuck script doesn't pin the pending entry forever.
  setTimeout(() => {
    if (!settled) {
      finish();
      const q = pendingDeltas[platformId];
      const idx = entry ? q.indexOf(entry) : -1;
      if (idx !== -1) q.splice(idx, 1);
      render({ platforms: lastSeenData, meta: lastSeenMeta });
    }
  }, 12000);
}

// Single shared scheduler so rapid clicks coalesce to ONE pull. Each click
// resets the timer — the actual pull fires `delayMs` after the LAST click.
let _scheduledPullTimer = null;
function schedulePull(delayMs) {
  if (_scheduledPullTimer) clearTimeout(_scheduledPullTimer);
  _scheduledPullTimer = setTimeout(() => {
    _scheduledPullTimer = null;
    pull();
  }, delayMs);
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function svg(viewBox, filled, paths) {
  const s = document.createElementNS(SVG_NS, 'svg');
  s.setAttribute('viewBox', viewBox);
  s.setAttribute('fill', filled ? 'currentColor' : 'none');
  if (!filled) { s.setAttribute('stroke', 'currentColor'); s.setAttribute('stroke-width', '2'); }
  paths.forEach(p => {
    const n = document.createElementNS(SVG_NS, p.tag);
    Object.entries(p.attrs).forEach(([k, v]) => n.setAttribute(k, v));
    s.appendChild(n);
  });
  return s;
}

// ─── Helpers ──────────────────────────────────────────
function el(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (v == null) return;
    if (k === 'class') n.className = v;
    else if (k === 'style') n.style.cssText = v;
    else if (k === 'dataset') Object.assign(n.dataset, v);
    else n.setAttribute(k, v);
  });
  children.forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') n.appendChild(document.createTextNode(String(c)));
    else n.appendChild(c);
  });
  return n;
}

// Minimal CSV parser (handles quoted values + commas inside quotes)
function parseCSV(text) {
  const rows = []; let row = [], val = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"' && text[i + 1] === '"') { val += '"'; i++; }
      else if (c === '"') q = false;
      else val += c;
    } else {
      if (c === '"') q = true;
      else if (c === ',') { row.push(val); val = ''; }
      else if (c === '\n') { row.push(val); rows.push(row); row = []; val = ''; }
      else if (c === '\r') {}
      else val += c;
    }
  }
  if (val !== '' || row.length) { row.push(val); rows.push(row); }
  return rows;
}

function parseState(csvText) {
  const rows = parseCSV(csvText);
  const platforms = {}; const meta = {};
  let mode = 'platforms';
  for (const r of rows) {
    if (!r.length || !r[0]) { mode = 'meta'; continue; }
    if (r[0] === 'platform' || r[0] === 'meta') continue;
    if (mode === 'platforms') {
      const [p, today, total, daily, totalGoal, lastSeen, status, week, weeklyGoal] = r;
      if (!p) continue;
      platforms[p] = {
        today_count: parseInt(today || 0, 10),
        total_count: parseInt(total || 0, 10),
        daily_goal: Math.ceil(parseFloat(daily || 0)),
        total_goal: parseInt(totalGoal || 0, 10),
        last_seen_id: lastSeen || '',
        status: status || '',
        week_count: parseInt(week || 0, 10),
        weekly_goal: parseInt(weeklyGoal || 0, 10),
      };
    } else {
      meta[r[0]] = r[1];
    }
  }
  return { platforms, meta };
}

// ─── Animation tracking ───────────────────────────────
const lastSeenTotals = {};

/** "YYYY-MM-DD" in Asia/Kuwait, matches the meta.current_day format. */
function kuwaitDateKey(d) {
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Asia/Kuwait', year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(d).reduce((o, p) => (o[p.type] = p.value, o), {});
  return parts.year + '-' + parts.month + '-' + parts.day;
}

/** "wk-N" Monday-aligned, matches Apps Script's isoWeekKey_. */
function kuwaitWeekKey(d) {
  const dayMs = new Date(kuwaitDateKey(d) + 'T00:00:00Z').getTime();
  const epochMs = new Date('1970-01-05T00:00:00Z').getTime();
  return 'wk-' + Math.floor((dayMs - epochMs) / 86400000 / 7);
}

function render(parsed) {
  const { platforms, meta } = parsed;
  // Client-side staleness: if the server's stored current_day or current_iso_week
  // doesn't match Kuwait NOW (which happens between Kuwait midnight and the
  // first click that triggers the lazy rollover), display zero for the matching
  // counter so the dashboard doesn't show yesterday's count under today's date.
  const todayKey = kuwaitDateKey(new Date());
  const weekKey = kuwaitWeekKey(new Date());
  const staleDay = meta && meta.current_day && String(meta.current_day).trim() !== todayKey;
  const staleWeek = meta && meta.current_iso_week && String(meta.current_iso_week).trim() !== weekKey;

  // Headline minis (apply offsets so optimistic +1 is reflected immediately)
  HEADLINE_PLATFORMS.forEach(pid => {
    const d = platforms[pid] || {};
    const item = document.querySelector(`[data-mini="${pid}"]`);
    if (!item) return;
    const goal = d.total_goal || 0;
    const cur = (d.total_count || 0) + (offsets[pid] || 0);
    item.querySelector('[data-mini-fill]').style.width = Math.min(100, goal ? (cur / goal) * 100 : 0) + '%';
    item.querySelector('[data-mini-num]').textContent = cur;
    item.querySelector('[data-mini-goal]').textContent = ' / ' + goal;
  });

  // Hero
  const heroCurrent = 0;  // Skool member count not in sheet yet; placeholder
  document.getElementById('heroCurrent').textContent = heroCurrent;
  document.getElementById('heroFill').style.width = Math.min(100, (heroCurrent / SKOOL_GOAL) * 100) + '%';

  const now = new Date();
  const end = new Date(END_DATE);
  const daysLeft = Math.max(0, Math.ceil((end - now) / 86400000));
  document.getElementById('daysRemaining').textContent = daysLeft;
  document.getElementById('paceNum').textContent = daysLeft > 0 ? ((SKOOL_GOAL - heroCurrent) / daysLeft).toFixed(1) : '—';

  // Cards
  let todayTotal = 0, todayGoalSum = 0;
  PLATFORMS.forEach(p => {
    const card = grid.querySelector(`.card[data-platform="${p.id}"]`);
    if (!card) return;
    const d = platforms[p.id] || {};
    const offset = offsets[p.id] || 0;
    // Stale-day / stale-week zeroing: if the server hasn't rolled over yet
    // for the new Kuwait day or week, display 0 for that counter so we don't
    // show yesterday/last-week's number under today's date.
    const baseToday = staleDay ? 0 : (d.today_count || 0);
    const baseWeek = staleWeek ? 0 : (d.week_count || 0);
    // Floor display at 0 — the FIFO drain can momentarily produce negative
    // composites when +1s and -1s are processed out of order on the server.
    const today = Math.max(0, baseToday + offset);
    const total = Math.max(0, (d.total_count || 0) + offset);
    const week = Math.max(0, baseWeek + offset);
    const daily = d.daily_goal || 0;
    const totalGoal = d.total_goal || 0;
    const weeklyGoal = d.weekly_goal || 0;
    const status = d.status || '';

    const todayEl = card.querySelector('[data-today]');
    const totalEl = card.querySelector('[data-total]');
    const totalGoalEl = card.querySelector('[data-total-goal]');
    const fillEl = card.querySelector('[data-fill]');
    const remainingEl = card.querySelector('[data-remaining]');
    const dailyEl = card.querySelector('[data-daily]');
    const weekEl = card.querySelector('[data-week]');
    const weekGoalEl = card.querySelector('[data-week-goal]');
    const weekFillEl = card.querySelector('[data-week-fill]');
    const badge = card.querySelector('[data-badge]');

    todayEl.textContent = today;
    totalEl.textContent = total;
    totalGoalEl.textContent = ' / ' + totalGoal;
    dailyEl.textContent = daily;
    weekEl.textContent = week;
    weekGoalEl.textContent = weeklyGoal;
    weekFillEl.style.width = Math.min(100, weeklyGoal ? (week / weeklyGoal) * 100 : 0) + '%';
    fillEl.style.width = Math.min(100, totalGoal ? (total / totalGoal) * 100 : 0) + '%';

    const rem = Math.max(0, daily - today);
    if (rem === 0 && daily > 0) {
      remainingEl.textContent = '✓ ضربت هدف اليوم';
      remainingEl.classList.add('done');
      card.classList.add('goal-hit');
    } else {
      remainingEl.textContent = `متبقي: ${rem}`;
      remainingEl.classList.remove('done');
      card.classList.remove('goal-hit');
    }

    // Badge — all platforms are manual now
    badge.className = 'card-badge';
    badge.textContent = 'SHARED';

    // Animate on increase
    if (lastSeenTotals[p.id] !== undefined && total > lastSeenTotals[p.id]) {
      todayEl.classList.remove('bumping'); void todayEl.offsetWidth; todayEl.classList.add('bumping');
      card.classList.remove('pulse'); void card.offsetWidth; card.classList.add('pulse');
    }
    lastSeenTotals[p.id] = total;

    todayTotal += today;
    todayGoalSum += daily;
  });

  document.getElementById('todayTotal').textContent = todayTotal;
  document.getElementById('todayGoal').textContent = todayGoalSum;

  // Last post
  const lpRaw = meta['last_post_at'];
  if (lpRaw) {
    const dt = isNaN(parseInt(lpRaw)) ? new Date(lpRaw) : new Date(parseInt(lpRaw) * 1000);
    document.getElementById('lastPost').textContent = timeAgo(dt);
  }

  // Date label + updated
  document.getElementById('date').textContent = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Kuwait', weekday: 'short', day: 'numeric', month: 'short'
  }).format(new Date());
  document.getElementById('updated').textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function timeAgo(date) {
  const diff = Date.now() - date.getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'قبل ثوان';
  if (m < 60) return `قبل ${m} د`;
  const h = Math.floor(m / 60);
  if (h < 24) return `قبل ${h} س`;
  return new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short' }).format(date);
}

// ─── Poll loop ────────────────────────────────────────
// Single-flight guard plus a "run-again-after" flag: if a click-driven pull
// fires while another pull is in flight, we re-run after the current one
// finishes so we never lose the confirmation pass.
let _pullInFlight = false;
let _pullAgain = false;
async function pull() {
  if (_pullInFlight) { _pullAgain = true; return; }
  _pullInFlight = true;
  // Stamp the moment our CSV fetch leaves the wire. Per-platform updates
  // below are gated against this — if a JSONP response arrived AFTER we
  // started fetching, our CSV data is staler than what JSONP already wrote,
  // so we must not overwrite lastSeenData for that platform.
  const pullStartedAt = Date.now();
  const liveText = document.getElementById('liveText');
  try {
    const r = await fetch(CSV_URL + '&_=' + pullStartedAt, { cache: 'no-store' });
    if (!r.ok) throw new Error('http_' + r.status);
    const text = await r.text();
    const parsed = parseState(text);
    const now = Date.now();
    // CSV from docs export is eventually-consistent — under rapid writes it
    // can return a snapshot a few seconds behind. JSONP responses are
    // authoritative for the click they ack. So if THIS platform had a JSONP
    // response within the last 5s, treat the CSV as stale and skip overwriting
    // lastSeenData for it.
    const PULL_TRUST_JSONP_MS = 5000;
    Object.keys(pendingDeltas).forEach(k => {
      const jsonpFresher = (now - (lastJsonpAt[k] || 0)) < PULL_TRUST_JSONP_MS;
      // Time-out stuck queue entries always (independent of freshness check).
      pendingDeltas[k] = pendingDeltas[k].filter(e => now - e.at < 10000);
      if (jsonpFresher) return;  // JSONP is fresher than this CSV snapshot.

      const newToday = (parsed.platforms[k] || {}).today_count || 0;
      const prevToday = serverLastSeenToday[k];
      let serverDelta = (prevToday === undefined) ? 0 : (newToday - prevToday);
      const q = pendingDeltas[k];
      // FIFO drain — pop queue entries the server has caught up to. Catches
      // confirmations the JSONP path missed (callback lost, network drop).
      while (q.length > 0 && serverDelta !== 0) {
        const head = q[0];
        if (Math.sign(head.delta) !== Math.sign(serverDelta)) break;
        const absHead = Math.abs(head.delta);
        const absSrv = Math.abs(serverDelta);
        if (absSrv >= absHead) {
          serverDelta -= head.delta;
          q.shift();
        } else {
          head.delta -= Math.sign(head.delta) * absSrv;
          serverDelta = 0;
        }
      }
      pendingDeltas[k] = q.filter(e => now - e.at < 10000);
      serverLastSeenToday[k] = newToday;
      lastSeenData[k] = parsed.platforms[k] || lastSeenData[k];
    });
    lastSeenMeta = parsed.meta || {};
    render({ platforms: lastSeenData, meta: lastSeenMeta });

    liveText.textContent = 'LIVE';
  } catch (e) {
    liveText.textContent = 'OFFLINE';
  } finally {
    _pullInFlight = false;
    if (_pullAgain) { _pullAgain = false; pull(); }
  }
}

buildCards();
buildHeadlineMini();
pull();
setInterval(pull, POLL_INTERVAL_MS);

  muted = !muted;
  localStorage.setItem('reels.muted', muted ? '1' : '0');
  applyMuteUI();
  if (!muted) playChime('plus');
});
